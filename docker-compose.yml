# Two-service stack: a zebrad full node and lightwalletd-rs in front of it.
#
# Note: zebra must sync the chain on first run (hours, and tens to hundreds of GB in the `zebra-state`
# volume) before lightwalletd-rs can serve anything. The zebra service here is a starting template —
# check the image tag and config mechanism against the current zebra docker docs for your version.
#
# TLS: lightwalletd-rs serves over TLS using the certificate mounted from ./certs. Before `docker compose
# up`, put a PEM certificate and key (cert.pem / key.pem) there — your real certificate in production, or a
# self-signed pair for local testing.
services:
  zebra:
    image: zfnd/zebra:latest
    volumes:
      - ./docker/zebrad.toml:/etc/zebrad/zebrad.toml:ro
      - zebra-state:/var/cache/zebrad
    environment:
      ZEBRA_CONF_PATH: /etc/zebrad/zebrad.toml
    restart: unless-stopped

  lightwalletd-rs:
    build: .
    depends_on:
      - zebra
    command:
      - --rpc-url=http://zebra:8232
      - --grpc-bind=0.0.0.0:9067
      - --tls-cert=/certs/cert.pem
      - --tls-key=/certs/key.pem
      # Metrics are disabled from outside the container by default (loopback bind). To scrape
      # from an in-network Prometheus, change the bind to 0.0.0.0:9100 but do NOT publish the
      # port to the host; never expose /metrics directly to the host or internet.
      - --metrics-bind=127.0.0.1:9100
      - --data-dir=/var/lib/lightwalletd-rs
    volumes:
      - ./certs:/certs:ro
      - lwd-data:/var/lib/lightwalletd-rs
    ports:
      - "9067:9067" # gRPC
    restart: unless-stopped

volumes:
  zebra-state:
  lwd-data:
