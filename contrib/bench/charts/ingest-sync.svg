<rect x="118" y="228" width="80.2" height="14" rx="4" fill="#00add8"/>
<text x="110" y="239.0" text-anchor="end" fill="#888888" font-size="12">Go</text>
<text x="204.2" y="239.0" fill="#888888" font-size="12">6.6 b/s</text>
<text x="118" y="276" fill="#888888" font-size="13">R3 recent (start 3,300,000)</text>
<rect x="118" y="286" width="451.8" height="14" rx="4" fill="#e43717"/>
<text x="110" y="297.0" text-anchor="end" fill="#888888" font-size="12">NEW</text>
<text x="575.8" y="297.0" fill="#888888" font-size="12">232.0 b/s*</text>
<rect x="118" y="308" width="108.3" height="14" rx="4" fill="#eda100"/>
<text x="110" y="319.0" text-anchor="end" fill="#888888" font-size="12">OLD</text>
