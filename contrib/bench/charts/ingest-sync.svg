<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 568" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="13">
<text x="360" y="22" text-anchor="middle" font-size="15" fill="#888888">ingest throughput — NEW Rust vs OLD Rust vs Go (mainnet, 2026-07)</text>
