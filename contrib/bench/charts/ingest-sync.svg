<rect x="118" y="184" width="451.8" height="14" rx="4" fill="#e43717"/>
<text x="110" y="195.0" text-anchor="end" fill="#888888" font-size="12">NEW</text>
<text x="575.8" y="195.0" fill="#888888" font-size="12">37.2 b/s</text>
<rect x="118" y="206" width="68.0" height="14" rx="4" fill="#eda100"/>
