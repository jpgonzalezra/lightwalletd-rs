<line x1="404.4" y1="459" x2="404.4" y2="503" stroke="#888888" stroke-opacity="0.15"/>
<text x="404.4" y="517" text-anchor="middle" fill="#888888" font-size="11">6h</text>
<line x1="499.9" y1="459" x2="499.9" y2="503" stroke="#888888" stroke-opacity="0.15"/>
<text x="499.9" y="517" text-anchor="middle" fill="#888888" font-size="11">8h</text>
<line x1="595.4" y1="459" x2="595.4" y2="503" stroke="#888888" stroke-opacity="0.15"/>
<text x="595.4" y="517" text-anchor="middle" fill="#888888" font-size="11">10h</text>
<rect x="118" y="459" width="65.6" height="14" rx="4" fill="#e43717"/>
<text x="110" y="470.0" text-anchor="end" fill="#888888" font-size="12">NEW Rust</text>
<text x="189.6" y="470.0" fill="#888888" font-size="12">1h 22m</text>
<rect x="118" y="481" width="382.0" height="14" rx="4" fill="#00add8"/>
<rect x="500.0" y="481" width="95.4" height="14" rx="4" fill="none" stroke="#00add8" stroke-width="1.5" stroke-dasharray="3,3"/>
<text x="110" y="492.0" text-anchor="end" fill="#888888" font-size="12">Go</text>
<text x="601.4" y="492.0" fill="#888888" font-size="12">≈9.5–10h</text>
<text x="118" y="521" fill="#888888" font-size="11">NEW Rust: measured. Go: solid = measured to the 8h cap (59.9% of chain);</text>
<text x="118" y="536" fill="#888888" font-size="11">dashed = extrapolated total from measured post-spam rates (see results docs).</text>
</svg>
