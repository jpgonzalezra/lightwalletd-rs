<rect x="118" y="126" width="319.6" height="14" rx="4" fill="#00add8"/>
<text x="110" y="137.0" text-anchor="end" fill="#888888" font-size="12">Go</text>
<text x="443.6" y="137.0" fill="#888888" font-size="12">352.1 b/s</text>
