<text x="110" y="341.0" text-anchor="end" fill="#888888" font-size="12">Go</text>
<text x="575.8" y="341.0" fill="#888888" font-size="12">232.0 b/s*</text>
<text x="118" y="376" fill="#888888" font-size="11">* tip-capped: ingestor caught up to the live chain tip mid-window and idled</text>
<text x="118" y="391" fill="#888888" font-size="11">(effective catch-up ≈281-297 blocks/s — see results docs)</text>
<line x1="118" y1="413" x2="664" y2="413" stroke="#888888" stroke-opacity="0.25"/>
